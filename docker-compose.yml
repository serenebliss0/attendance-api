services:

  api:
    build: .

    container_name: attendance-api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - db

    env_file:
      - .env

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:17

    container_name: attendance-db

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: